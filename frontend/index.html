<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Atendimento FIFO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-grid">
      
        <div class="col">
            <section class="card">
                <h2>1. Cadastrar Cliente</h2>
                <form id="form-cadastro">
                    <input type="text" id="nome" placeholder="Nome completo" required>
                    <input type="number" id="idade" placeholder="Idade" min="1" max="150" required>
                    <button type="submit" class="btn-primary">Adicionar à Fila</button>
                </form>
            </section>

            <section class="card">
                <h2>2. Operações do Painel</h2>
                <button id="btn-chamar" class="btn-success">🔔 Chamar Próximo Cliente</button>
                <div id="alerta-chamado" class="alerta hidden"></div>
            </section>

            <section class="card">
                <h2>3. Cancelar Atendimento</h2>
                <form id="form-cancelar">
                    <input type="text" id="nome-cancelar" placeholder="Nome exato do cliente" required>
                    <button type="submit" class="btn-danger">Remover da Fila</button>
                </form>
            </section>
        </div>

        
        <div class="col">
            <section class="card principal">
                <h2>Fila de Espera (<span id="total-fila">0</span>)</h2>
                <div id="lista-fila" class="fila-lista">
                    
                </div>
            </section>
        </div>

        
        <div class="col">
            <section class="card">
                <h2>Histórico de Atendimentos</h2>
                <div id="lista-historico" class="historico-lista">
                    
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
